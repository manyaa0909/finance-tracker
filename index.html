<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <h1>💰 Personal Finance Tracker</h1>

        <!-- Balance Summary -->
        <div class="summary">
            <div class="summary-box income-box">
                <h3>Total Income</h3>
                <p id="total-income">₹0</p>
            </div>
            <div class="summary-box expense-box">
                <h3>Total Expense</h3>
                <p id="total-expense">₹0</p>
            </div>
            <div class="summary-box balance-box">
                <h3>Balance</h3>
                <p id="balance">₹0</p>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="form-section">
            <h2>Add Transaction</h2>
            <input type="text" id="description" placeholder="Description (e.g. Salary, Food)">
            <input type="number" id="amount" placeholder="Amount (e.g. 5000)">
            <select id="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            <button id="add-btn">Add Transaction</button>
        </div>

        <!-- Transaction List -->
        <div class="transaction-section">
            <h2>Transactions</h2>
            <ul id="transaction-list"></ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
